<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page description">
    <meta name="keywords" content="keyword1, keyword2">
    <meta property="og:title" content="Page Title">
    <meta property="og:description" content="Page description">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.example.com">
    <meta property="og:image" content="https://www.example.com/image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Page Title">
    <meta name="twitter:description" content="Page description">
    <meta name="twitter:image" content="https://www.example.com/image.jpg">

    <style>
        *{
            margin: 0;
            padding: 0;
            border: 0;
            box-sizing: border-box;
        }
        main{
            border: solid 2px red;
            width: 1200px;
            margin: 0 auto;
        }
        section{
            height: 300px;
            border: solid 3px green;
            background-color: #50c9ee;
        }
        /* Aqui é uma CLASSE */
        .container-cards{
            width: 100%;
            display: flex;
        }
        .card{
            border: solid 2px black;
            background-color: yellow;
            width: 250px;
            height: 200px;
        }
        .titulo{
            font-size: 20px;
            color: #06652e;
            padding: 10px;
        }
        .card-img{
            width: 200px;
            height: 150px;
            margin: 5px auto;
            border: solid 2px black;
        }
        /* Aqui é um ID */
        #botao-cancelar{
            width: 300px;
            background-color: red;
        }
    </style>
</head>
<!--
css inline é dentro do elemento "tag"
css interno/critico é dentro do cabeçalho html
css externo fora do documento

Selectores
proprios nome elementos
classes prefixo do nome é ponto ex   .card (vários locais)
id      prefixo do nome é hash  ex   #botao-form (obs. id somente UM dentro do html)
-->
